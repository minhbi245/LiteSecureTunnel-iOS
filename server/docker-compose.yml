services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    environment:
      # Mac LAN IP — iPhone connects to this address over WiFi.
      # Find with: ipconfig getifaddr en0
      - WG_HOST=<YOUR_MAC_LAN_IP>
      # Generate with: docker run -it ghcr.io/wg-easy/wg-easy wgpw YOUR_STRONG_PASSWORD
      # Paste the bcrypt hash output below (keep $$ escaping for compose).
      # Do not commit a real hash for a production-valued password.
      - PASSWORD_HASH=$$2a$$12$$<REPLACE_WITH_BCRYPT_HASH>
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_PORT=51820
    volumes:
      - ./data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.src_valid_mark: 1
    restart: unless-stopped
