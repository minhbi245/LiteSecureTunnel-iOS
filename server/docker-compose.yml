services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    environment:
      # Mac LAN IP — iPhone connects to this address over WiFi.
      # Update if your Mac's IP changes (verify with: ipconfig getifaddr en0)
      - WG_HOST=192.168.1.8
      # Generate with: docker run -it ghcr.io/wg-easy/wg-easy wgpw YOUR_PASSWORD
      # Replace with the output (keep $$ escaping for compose).
      # Admin password: admin123 (change for production)
      - PASSWORD_HASH=$$2a$$12$$***REMOVED***
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_PORT=51820
    volumes:
      - ./data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.src_valid_mark: 1
    restart: unless-stopped
